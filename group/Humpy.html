<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Hacker | 幻贺箍牙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 25px;
            background: #333;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: #555;
        }

        /* 个人名片 */
        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #333;
        }

        .bio {
            color: #666;
            margin: 20px 0;
            line-height: 1.6;
            font-size: 1rem;
        }

        .info {
            text-align: center;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .info p {
            margin: 12px 0;
            color: #555;
            text-align: center;
        }

        .info strong {
            color: #333;
            width: 80px;
            display: inline-block;
        }
/* ========== 手机适配 ========== */
@media (max-width: 768px) {
    body {
        padding: 20px 10px;
    }

    .group-name {
        font-size: 1.8rem;
    }

    .members-grid {
        flex-wrap: wrap;      /* 允许换行 */
        gap: 15px;
        padding: 0 10px;
    }

    .member-card {
        flex: 0 0 calc(50% - 15px);  /* 每行显示2个 */
        min-width: auto;
        padding: 20px 10px;
    }

    .member-avatar {
        font-size: 2.5rem;
    }

    .member-name {
        font-size: 1rem;
    }

    .footer-box {
        font-size: 0.8rem;
        padding: 15px;
    }
}

/* 小手机（宽度小于480px） */
@media (max-width: 480px) {
    .member-card {
        flex: 0 0 calc(50% - 10px);  /* 每行2个 */
    }

    .group-name {
        font-size: 1.5rem;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <!-- 返回按钮 -->
        <a href="index.html" class="back-btn">← 返回群主页</a>

        <!-- 个人名片 -->
        <div class="profile-card">
            <img src="Humpy.jpg" alt="Humpy头像" class="avatar">
            <h1>Humpy</h1>
            <div class="bio">
                xzh<br>
            </div>
            <div class="info">
                <p>北京工业大学 微电子</p>

            </div>
        </div>
    </div>
</body>
</html>
