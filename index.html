<!DOCTYPE html> <!--这是一个html文档，告诉浏览器用标准模式编辑-->
<html lang="zh-CN"> <!--根标签，声明语言是中文-->
<head>
    <meta charset="UTF-8"> <!--声明字符为UTF-8-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--手机适配-->
    <title>幻贺箍牙</title> <!--标题-->
    <style> <!--开始写CSS-->
        * { /* 第一块：文档声明与头部 */
            margin: 0; /* 去掉默认外边距 */
            padding: 0; /* 去掉默认内边距 */
            box-sizing: border-box; /* 让宽高的计算在width内部 */
        }

        body { /* 第二块：全局样式和body */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* 字体 */
            background: white;  /* 背景：白色 */
            min-height: 100vh;  /* 最小高度：沾满整个屏幕视口 */
            padding: 20px 40px; /* 内边距（上下20 左右40） */
        }

        /* 第三块：容器样式 */
        .container { 
            max-width: 1200px; /* 宽度上限 */
            margin: 0 auto; /* 上下0，左右自动 实现水平居中 */
            width: 100%; /* 宽度占满到上限 */
        }

        .group-name { 
            font-size: 2.5rem; /* 字号 */
            font-weight: bold; /* 粗体 */
            text-align: center; /* 居中 */
            margin-bottom: 20px; /* 下边距 */
        }

        /* 第四块：板块和卡片样式 */
        .section {
            margin-bottom: 40px; /* 每个板块下方留空白 */   
        }

        .section-title { 
            font-size: 1.5rem; /* 字体 */
            font-weight: bold; /* 粗体 */
            text-align: center; /* 居中 */
            margin-bottom: 20px; /* 下边距 */
            color: #333; /* 色号 */
        }

        .grid {
            display: flex; /* 弹性布局，使得能够排成一列 */
            justify-content: center; /* 子元素水平居中 */
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white; /* 白底 */
            border-radius: 12px; /* 圆角12像素 */
            padding: 15px 10px;/* 内边距（上下 左右） */
            text-align: center; /* 文字居中 */
            cursor: pointer; /* 鼠标悬停 */
            flex: 1; /* 弹性放大 */
            min-width: 80px; /* 最小宽度 */
            max-width: 100px; /* 宽度最大值 */
            box-shadow: 0 3px 10px rgba(0,0,0,0.08); /* 阴影效果 */
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .card-avatar {
            font-size: 2rem; /* 头像和emoji大小 */
            margin-bottom: 8px; /* 和下方名字之间的距离 */
        }

        .card-name {
            font-size: 0.9rem; /* 名字字号 */
            font-weight: 600; /* 半粗体 */
            color: #333; /* 色号 */
        }

        /* 第五块：详情区域 - 小批注样式 */
        .detail-section { /* 外壳容器 */
            margin: 10px 0 30px; /* 上 左右 下 */
            text-align: center; /* 内容居中 */
        }

        .detail-card { /* 点击后出现的卡片详情 */
            background: #f5f5f5; /* 背景色号 */
            padding: 8px 15px; /* 内间距 上下 左右 */
            display: inline-flex; /* 弹性盒子 */
            align-items: center; /* 垂直居中 */
            justify-content: center; /* 水平居中 */
            gap: 12px; /* 子元素间距 */
            flex-wrap: wrap; /* 换行 */
        }

        .detail-avatar {/* 头像 */
            width: 30px; /* 宽度 */
            height: 30px; /* 高度 */
            border-radius: 50%; /* 圆形 */
            object-fit: cover; /* 裁剪方式：覆盖整个区域 */
        }

        .detail-card h1 {/* 昵称 */
            font-size: 0.85rem; /* 字号 */
            color: #333; /* 颜色 */
        }

        .detail-bio, /* 姓名缩写 */
        .detail-info p { /* 学校 */
            font-size: 0.75rem;
            color: #666;
        }

        .close-detail { /* 关闭按钮 */
            padding: 2px 10px; /* 内边距 */
            background: #ddd; /* 色号 */
            border: none; /* 无边框 */
            border-radius: 12px; /* 圆角 */
            cursor: pointer; /* 手动光标 */
            font-size: 0.7rem; /* 小字号 */
        }

        .empty-detail { /* 未点击时的提示样式 */
            color: #999; /* 色号 */
            font-size: 0.7rem; /* 小字号 */
            background: transparent; /* 透明背景 */
        }

        .open-pdf-btn { /* 打开PDF */
            margin: 0;
            padding: 4px 12px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
        }

        .open-pdf-btn:hover {
            background: #3a7bc8;
        }

        /* 游戏板块样式 */
        .game-gallery {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            display: inline-block;  /* 宽度根据内容自动撑开 */
            width: auto;            /* 不占满整行 */
            min-width: 200px;       /* 最小宽度 */
        }

        .game-images-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .game-img-card {
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            width: 100px;
        }

        .game-img-card:hover {
            transform: scale(1.05);
        }

        .game-thumb {
            width: 100%;
            height: 80px;
            object-fit: cover;
            display: block;
        }

        /* 大图弹窗 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            cursor: pointer;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 第六块：页脚+手机适配 */
        .footer-box {
            background: white; /* 背景色号 */
            border-radius: 10px; /* 圆角 */
            padding: 12px; /* 内边距 */
            text-align: center; /* 居中 */
            color: #999; /* 文字色号 */
            font-size: 0.75rem; /* 小字号 */
            margin-top: 20px; /* 上边距 */
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            body {
                padding: 15px; /* 上下内边距 */
            }
            .group-name {
                font-size: 1.8rem; /* 群名称缩小 */
            }
            .section-title {
                font-size: 1.2rem; /* 板块标题缩小 */
            }
            .card {
                max-width: 70px; /* 卡片更窄 */
                padding: 10px 5px;/* 内边距缩小 */
            }
            .card-avatar {
                font-size: 1.5rem; /* 头像缩小 */
            }
            .card-name {
                font-size: 0.7rem;/* 名字字号缩小 */
            }
            .detail-card {
                padding: 5px 12px; /* 详情内边距缩小 */
                gap: 8px; /* 间距缩小 */
            }
            .game-img-card {
                width: 70px;
            }
            .game-thumb {
                height: 60px;
            }
        }
    </style>
</head>

<body> <!--第七块：HTML部分-->
    <!--容器第一层-->
    <div class="container"> 
        <!--容器第二层-->
        <div class="group-name">幻贺箍牙</div> <!--群名称--> 

        <!-- 群成员 -->
        <div class="section">
            <div class="section-title">👥 群成员</div>
            <div class="grid">
                <div class="card" data-type="member" data-id="owner">
                    <div class="card-avatar">🐖</div>
                    <div class="card-name">群🐖</div>
                </div>
                <div class="card" data-type="member" data-id="arnold">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Arnold</div>
                </div>
                <div class="card" data-type="member" data-id="bernard">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Bernard</div>
                </div>
                <div class="card" data-type="member" data-id="hacker">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Hacker</div>
                </div>
                <div class="card" data-type="member" data-id="humpy">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Humpy</div>
                </div>
            </div>
        </div>

        <!-- 群生活 -->
        <div class="section">
            <div class="section-title">📚 群生活</div>
            <div class="grid">
                <!-- 文章卡片 -->
                <div class="card" data-type="life" data-id="text">
                    <div class="card-avatar">📖</div>
                    <div class="card-name">文章</div>
                </div>

                <!-- 游戏相册卡片 -->
                <div class="card" data-type="game" data-id="game">
                    <div class="card-avatar">🎮</div>
                    <div class="card-name">三国杀</div>
                </div>
            </div>
        </div>

        <!-- 详情展示区 -->
        <div class="detail-section" id="detailSection">
            <div class="empty-detail">💡 点击卡片查看详情</div>
        </div>

        <div class="footer-box">惊天五条区 | 始于2025.8.1</div>
    </div>

    <script><!-- 第八块:JavaScript -->
        // 成员数据 一个对象，存储了每个成员的信息
        const membersData = {
            owner: {
                name: "群🐖",
                avatar: "群主.jpg",
                bio: "yrc",
                info: "北京邮电大学 电子（元）"
            },
            arnold: {
                name: "Arnold",
                avatar: "Arnold.jpg",
                bio: "ymz",
                info: "北京大学 计算机"
            },
            bernard: {
                name: "Bernard",
                avatar: "Bernard.jpg",
                bio: "fyl",
                info: "湖南大学 法学"
            },
            hacker: {
                name: "Hacker",
                avatar: "Hacker.jpg",
                bio: "ljr",
                info: "北京邮电大学 计算机"
            },
            humpy: {
                name: "Humpy",
                avatar: "Humpy.jpg",
                bio: "xzh",
                info: "北京工业大学 微电子"
            }
        };

        // 群生活数据
        const lifeData = {
            text: {
                name: "文章",
                avatar: "📖",
                pdf: "memorial.pdf"      // PDF 文件路径
            }
        };

        // 游戏数据
        const gameData = {
            game: {
                name: "游戏相册",
                avatar: "🎮",
                images: ["sanYan.jpg", "sanYang.jpg", "sanFu.jpg", "sanLi.jpg", "sanXie.jpg"]
            }
        };

        //获取页面上的详细容器（通过detailsection找到）
        const detailSection = document.getElementById('detailSection');

        //函数：显示成员详情
        function showMemberDetail(memberId) {
            const member = membersData[memberId];
            if (!member) return;

            const avatarHtml = member.avatar 
                ? `<img src="${member.avatar}" alt="${member.name}头像" class="detail-avatar">`
                : `<div class="detail-avatar" style="background:#ddd; width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:1rem;">👤</div>`;

            detailSection.innerHTML = `
                <div class="detail-card">
                    ${avatarHtml}
                    <h1>${member.name}</h1>
                    <div class="detail-bio">${member.bio}</div>
                    <div class="detail-info"><p>${member.info}</p></div>
                    <button class="close-detail" onclick="closeDetail()">✕</button>
                </div>
            `;
        }

        //函数：显示生活详情
        function showLifeDetail(lifeId) {
            const life = lifeData[lifeId];
            if (!life) return;

            // 判断是否有 pdf 文件（用于文章卡片）
            if (life.pdf) {
                detailSection.innerHTML = `
                    <div class="detail-card">
                        <div class="detail-avatar" style="background:#ddd; width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:1.2rem;">${life.avatar}</div>
                        <h1>${life.name}</h1>
                        <button class="open-pdf-btn" onclick="window.open('${life.pdf}')">📄 追忆似水年华</button>
                        <button class="close-detail" onclick="closeDetail()">✕</button>
                    </div>
                `;
                return;
            }
        }

        // 函数：显示游戏板块（5张图片缩略图）
        function showGameDetail(gameId) {
            const game = gameData[gameId];
            if (!game) return;

            // 生成5张图片的缩略图
            let imagesHtml = '';
            game.images.forEach(img => {
                imagesHtml += `
                    <div class="game-img-card" data-img="${img}">
                        <img src="${img}" alt="游戏图片" class="game-thumb">
                    </div>
                `;
            });

            detailSection.innerHTML = `
                <div class="game-gallery">
                    <div class="game-images-grid">
                        ${imagesHtml}
                    </div>
                    <button class="close-detail" onclick="closeDetail()">✕</button>
                </div>
            `;

            // 绑定每张图片的点击事件（点击后放大）
            document.querySelectorAll('.game-img-card').forEach(card => {
                card.addEventListener('click', function() {
                    const imgSrc = this.getAttribute('data-img');
                    showLightbox(imgSrc);
                });
            });
        }

        // 大图弹窗
        function showLightbox(imgSrc) {
            const lightbox = document.createElement('div');
            lightbox.className = 'lightbox';
            lightbox.innerHTML = `
                <span class="lightbox-close">&times;</span>
                <img src="${imgSrc}" class="lightbox-img">
            `;
            document.body.appendChild(lightbox);
            lightbox.style.display = 'flex';

            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox || e.target.className === 'lightbox-close') {
                    lightbox.remove();
                }
            });
        }

        //函数：关闭详情页面
        function closeDetail() {
            detailSection.innerHTML = '<div class="empty-detail">💡 点击卡片查看详情</div>';
        }

        // 绑定所有卡片的点击事件
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const type = this.getAttribute('data-type');
                const id = this.getAttribute('data-id');
                
                if (type === 'member') {
                    showMemberDetail(id);
                } else if (type === 'life') {
                    showLifeDetail(id);
                } else if (type === 'game') {
                    showGameDetail(id);
                }
            });
        });
    </script>
</body>
</html>
