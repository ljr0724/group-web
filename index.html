<!DOCTYPE html> <!--这是一个html文档，告诉浏览器用标准模式编辑-->
<html lang="zh-CN"> <!--根标签，声明语言是中文-->
<head>
    <meta charset="UTF-8"> <!--声明字符为UTF-8-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--手机适配-->
    <title>幻贺箍牙</title> <!--标题-->
    <link rel="stylesheet" href="style.css">
</head>

<body> <!--第七块：HTML部分-->
    <!--容器第一层-->
    <div class="container"> 
        <!--容器第二层-->
        <div class="group-name">幻贺箍牙</div> <!--群名称--> 

        <!-- 群成员 -->
        <div class="section">
            <div class="section-title">👥 群成员</div>
            <div class="grid">
                <div class="card" data-type="member" data-id="owner">
                    <div class="card-avatar">🐖</div>
                    <div class="card-name">群🐖</div>
                </div>
                <div class="card" data-type="member" data-id="arnold">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Arnold</div>
                </div>
                <div class="card" data-type="member" data-id="bernard">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Bernard</div>
                </div>
                <div class="card" data-type="member" data-id="hacker">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Hacker</div>
                </div>
                <div class="card" data-type="member" data-id="humpy">
                    <div class="card-avatar">👤</div>
                    <div class="card-name">Humpy</div>
                </div>
            </div>
        </div>

        <!-- 群生活 -->
        <div class="section">
            <div class="section-title">📚 群生活</div>
            <div class="grid">
                <!-- 文章卡片 -->
                <div class="card" data-type="life" data-id="text">
                    <div class="card-avatar">📖</div>
                    <div class="card-name">文章</div>
                </div>

                <!-- 游戏相册卡片 -->
                <div class="card" data-type="game" data-id="game">
                    <div class="card-avatar">🎮</div>
                    <div class="card-name">三国杀</div>
                </div>
            </div>
        </div>

        <!-- 详情展示区 -->
        <div class="detail-section" id="detailSection">
            <div class="empty-detail">💡 点击卡片查看详情</div>
        </div>

        <div class="footer-box">惊天五条区 | 始于2025.8.1</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
